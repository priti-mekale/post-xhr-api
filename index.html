<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XHR(call back eg.)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
        <div class="card my-4">
            <div class="card-body"> 
                
        <form id="blogform">

          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title">
            </div>

           <div class="form-group">
            <label for="body">Content</label>
            <textarea type="text" class="form-control" id="body" row="4"></textarea> 
            </div>

            <div class="form-group">
            <label for="userId"> User Id</label>
            <select class="form-control" id="userId">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>

            </select>
            </div>


            <button type="submit" class="btn btn-outline-primary btn-block">Add Post</button>
        </form>
    </div>
        
</div>
        
</div>
    
</div>
<div class="row flex-direction: column-reverse" id="blogsContainer"></div>
</div>  

    
        

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

<script src="app.js"></script>
</body>

</html>
